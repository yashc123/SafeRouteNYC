# SafePath local infrastructure: PostGIS database + Redis cache.

services:
  db:
    # Pinned image tag (NOT "latest") so the database behaves identically on your
    # machine now and on AWS later. Postgres 16 + PostGIS 3.4.
    image: postgis/postgis:16-3.4
    container_name: safepath-db
    restart: unless-stopped

    # Username and password come from backend/.env (POSTGRES_USER / POSTGRES_PASSWORD),
    # never hardcoded here. The database name is fixed to "safepath" (not a secret).
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DB: safepath

    ports:
      # Publish the standard Postgres port so the backend on the host can connect
      # via DATABASE_URL (host: localhost, port: 5432).
      - "5432:5432"

    volumes:
      # Named volume => data survives container restarts / recreation.
      - safepath_pgdata:/var/lib/postgresql/data

    healthcheck:
      # Marks the container "healthy" only once Postgres is actually accepting
      # connections. ($$ escapes the $ so the var is expanded inside the container.)
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d safepath"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    # Tier-3 cache for repeat /route and /reachable results. Pinned (NOT "latest").
    # No named volume: this is a disposable cache — losing it just forces recompute.
    image: redis:7.4-alpine
    container_name: safepath-redis
    restart: unless-stopped
    ports:
      # Publish the standard Redis port so the backend on the host connects via
      # REDIS_URL (redis://localhost:6379/0).
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  safepath_pgdata:
