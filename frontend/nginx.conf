# nginx serves the built SPA and reverse-proxies the API to the backend, so the
# whole app lives on ONE origin (port 80) — no CORS, one URL.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API -> FastAPI backend on the internal compose network. The trailing slash
    # on proxy_pass strips the /api prefix (e.g. /api/route -> backend /route).
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # The /agent endpoint can take a while (several model calls).
        proxy_read_timeout 120s;
    }

    # Single-page app: serve index.html for any non-file path.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
